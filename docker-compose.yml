version: "3.9"

services:

  # POSTGRES

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    networks:
      - nexpay-network

  # ZOOKEEPER
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    container_name: zookeeper

    ports:
      - "2181:2181"

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    networks:
      - nexpay-network


  # KAFKA

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    container_name: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    networks:
      - nexpay-network


  # REDIS

  redis:
    image: redis:7.2-alpine
    container_name: redis

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    networks:
      - nexpay-network


  # API GATEWAY

  api-gateway:
    build: ./api-gateway

    container_name: api-gateway

    ports:
      - "${SERVER_PORT}:8080"

    environment:

      SERVER_PORT: ${SERVER_PORT}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}

      USER_SERVICE_URL: ${USER_SERVICE_URL}
      WALLET_SERVICE_URL: ${WALLET_SERVICE_URL}
      TRANSACTION_SERVICE_URL: ${TRANSACTION_SERVICE_URL}
      REWARD_SERVICE_URL: ${REWARD_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

    depends_on:
      - user-service
      - wallet-service
      - transaction-service
      - reward-service
      - notification-service

    networks:
      - nexpay-network


  # USER SERVICE

  user-service:
    build: ./user-service

    container_name: user-service

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${USER_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    depends_on:
      - postgres
    expose:
      - "8081"

    networks:
      - nexpay-network


  # WALLET SERVICE

  wallet-service:
    build: ./wallet-service

    container_name: wallet-service

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${WALLET_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    depends_on:
      - redis
      - kafka
      - postgres

    expose:
      - "8085"

    networks:
      - nexpay-network


  # TRANSACTION SERVICE


  transaction-service:
    build: ./transaction-service

    container_name: transaction-service

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${TRANSACTION_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    depends_on:
      - wallet-service
      - kafka
      - postgres

    expose:
      - "8082"

    networks:
      - nexpay-network


  # REWARD SERVICE

  reward-service:
    build: ./reward-service

    container_name: reward-service

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${REWARD_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    depends_on:
      - kafka
      - postgres

    expose:
      - "8084"

    networks:
      - nexpay-network


  # NOTIFICATION SERVICE

  notification-service:
    build: ./notification-service

    container_name: notification-service

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${NOTIFICATION_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    depends_on:
      - kafka
      - postgres

    expose:
      - "8083"

    networks:
      - nexpay-network


networks:
  nexpay-network:
    driver: bridge

volumes:
  postgres-data: