server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

          routes:
            # user microservice route
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            # transaction microservice route
            - id: transaction-service
              uri: http://localhost:8082
              predicates:
                  - Path=/api/transaction/**

            # reward microservice route
            - id: reward-service
              uri: http://localhost:8084
              predicates:
                  - Path=/api/rewards/**

            # notification microservice route
            - id: notification-service
              uri: http://localhost:8083
              predicates:
                  - Path=/api/notify/**
